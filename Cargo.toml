[package]
name = "yttui"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
authors = ["Justin Benge <jbenge1@arizona.edu>"]
description = "Keyboard-driven YouTube TUI: search via yt-dlp, play via mpv."
license = "MIT"
readme = "README.md"
keywords = ["youtube", "tui", "ratatui", "yt-dlp", "mpv"]
categories = ["command-line-utilities", "multimedia"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
command-group = "5"
log = "0.4"
simplelog = "0.12"
dirs = "6"
which = "8"
ratatui = "0.30"
crossterm = "0.29"
unicode-width = "0.2"
clap = { version = "4", features = ["derive"] }

[dev-dependencies]
assert_cmd = "2"
predicates = "3"

[profile.release]
lto = true
codegen-units = 1
strip = true
panic = "abort"

[lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"

[lints.clippy]
pedantic = { level = "warn", priority = -1 }
cast_possible_truncation = "deny"
cast_sign_loss = "deny"
unwrap_used = "deny"
